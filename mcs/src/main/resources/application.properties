# Server
server.port=8080

# App name
spring.application.name=mcs

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/mcs_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=mcs-backend
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.hitachi.mcs.kafka
spring.kafka.consumer.properties.spring.json.value.default.type=com.hitachi.mcs.kafka.TransactionEvent

# MCS Kafka topic
mcs.kafka.topic.transaction-completed=transaction-completed

# MCS ML Service (Python/FastAPI, run separately — see ml-service/README.md)
mcs.ml-service.base-url=http://localhost:8000

# Python intent classifier microservice (ml-service)
chatbot.classifier.url=http://localhost:8001
