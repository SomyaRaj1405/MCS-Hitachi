<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">MCS database entity relationship diagram</title>
  <desc id="desc">Merchants and customers connect to bills, bills have transaction attempts, and a settled transaction has one settlement.</desc>
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="#111827" flood-opacity=".11"/></filter>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5 0 10z" fill="#64748b"/></marker>
    <style>.t{font:700 31px Segoe UI,Arial;fill:#111827}.st{font:16px Segoe UI,Arial;fill:#64748b}.b{fill:#fff;stroke:#d9e0e8;stroke-width:2;filter:url(#s)}.r{fill:#e60012}.k{fill:#111827}.h{font:700 19px Segoe UI,Arial;fill:#fff;letter-spacing:.8px}.f{font:14px Consolas,monospace;fill:#334155}.pk{font-weight:700;fill:#b7000e}.l{fill:none;stroke:#64748b;stroke-width:2.5;marker-end:url(#a)}.rl{font:600 13px Segoe UI,Arial;fill:#475569}.p{fill:#f8fafc;stroke:#cbd5e1}.ps{font:600 12px Segoe UI,Arial;fill:#475569}</style>
  </defs>
  <rect width="1600" height="900" fill="#f7f8fa"/><text x="60" y="55" class="t">MCS — Data Model</text><text x="60" y="84" class="st">PostgreSQL · lifecycle, ownership and refund persistence</text>
  <path class="l" d="M400 285C490 285 505 365 590 365"/><text x="450" y="305" class="rl">1 : many</text>
  <path class="l" d="M400 665C500 665 505 480 590 480"/><text x="455" y="625" class="rl">1 : many</text>
  <path class="l" d="M950 410C1035 410 1035 300 1120 300"/><text x="990" y="385" class="rl">1 : many</text>
  <path class="l" d="M1305 505V620"/><text x="1322" y="570" class="rl">1 : 0..1</text>

  <g transform="translate(60 135)"><rect class="b" rx="18" width="340" height="300"/><path class="r" d="M18 0h304q18 0 18 18v45H0V18Q0 0 18 0"/><text x="23" y="40" class="h">MERCHANTS</text><text x="23" y="94" class="f pk">PK  id</text><text x="23" y="123" class="f">    name</text><text x="23" y="152" class="f pk">UK  email</text><text x="23" y="181" class="f">    business_name</text><text x="23" y="210" class="f">    password_hash</text><text x="23" y="239" class="f">    phone · is_active</text><text x="23" y="268" class="f">    created_at · updated_at</text></g>
  <g transform="translate(60 515)"><rect class="b" rx="18" width="340" height="300"/><path class="k" d="M18 0h304q18 0 18 18v45H0V18Q0 0 18 0"/><text x="23" y="40" class="h">CUSTOMERS</text><text x="23" y="94" class="f pk">PK  id</text><text x="23" y="123" class="f">    name</text><text x="23" y="152" class="f pk">UK  email</text><text x="23" y="181" class="f">    password_hash</text><text x="23" y="210" class="f">    phone · is_active</text><text x="23" y="239" class="f">    created_at · updated_at</text></g>
  <g transform="translate(590 205)"><rect class="b" rx="18" width="360" height="430"/><path class="r" d="M18 0h324q18 0 18 18v45H0V18Q0 0 18 0"/><text x="23" y="40" class="h">BILLS</text><text x="23" y="94" class="f pk">PK  id</text><text x="23" y="123" class="f pk">FK  merchant_id</text><text x="23" y="152" class="f pk">FK  customer_id</text><text x="23" y="181" class="f">    amount · description</text><text x="23" y="210" class="f">    status · payment_method</text><text x="23" y="239" class="f">    refund_reason</text><text x="23" y="268" class="f">    refunded_at</text><text x="23" y="297" class="f">    created_at · updated_at</text><rect x="20" y="340" width="320" height="48" rx="12" class="p"/><text x="34" y="369" class="ps">PENDING · PAID · FAILED · REFUNDED</text></g>
  <g transform="translate(1120 125)"><rect class="b" rx="18" width="390" height="380"/><path class="k" d="M18 0h354q18 0 18 18v45H0V18Q0 0 18 0"/><text x="23" y="40" class="h">TRANSACTIONS</text><text x="23" y="94" class="f pk">PK  id</text><text x="23" y="123" class="f pk">FK  bill_id</text><text x="23" y="152" class="f">    payment_method · status</text><text x="23" y="181" class="f">    initiated_at</text><text x="23" y="210" class="f">    authorized_at</text><text x="23" y="239" class="f">    settled_at</text><text x="23" y="268" class="f">    created_at · updated_at</text><rect x="20" y="305" width="350" height="48" rx="12" class="p"/><text x="34" y="334" class="ps">INITIATED → AUTHORIZED → SETTLED / FAILED</text></g>
  <g transform="translate(1120 620)"><rect class="b" rx="18" width="390" height="220"/><path class="r" d="M18 0h354q18 0 18 18v45H0V18Q0 0 18 0"/><text x="23" y="40" class="h">SETTLEMENTS</text><text x="23" y="94" class="f pk">PK  id</text><text x="23" y="123" class="f pk">FK/UK  transaction_id</text><text x="23" y="152" class="f">       settled_amount</text><text x="23" y="181" class="f pk">UK     reference_number · timestamps</text></g>
</svg>
